<svg xmlns="http://www.w3.org/2000/svg" width="114" height="141" viewBox="0 0 114 141" role="img" aria-labelledby="title desc">
  <title id="title">HookCraft logo</title>
  <desc id="desc">A black circular music mark with violet spectrum bars, a silver note, and a two-line HOOK CRAFT wordmark.</desc>
  <defs>
    <radialGradient id="discGlow" cx="50%" cy="44%" r="56%">
      <stop offset="0%" stop-color="#161220"/>
      <stop offset="68%" stop-color="#060509"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="violetBars" x1="0" y1="31" x2="0" y2="95" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2733ff"/>
      <stop offset="54%" stop-color="#6d3dff"/>
      <stop offset="100%" stop-color="#b970ff"/>
    </linearGradient>
    <linearGradient id="floorGlow" x1="21" y1="82" x2="93" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2f2bff" stop-opacity="0"/>
      <stop offset="47%" stop-color="#9b71ff" stop-opacity=".92"/>
      <stop offset="100%" stop-color="#2f2bff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="noteInk" x1="37" y1="19" x2="78" y2="74" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="42%" stop-color="#c9c5ff"/>
      <stop offset="100%" stop-color="#7865d9"/>
    </linearGradient>
    <clipPath id="discClip">
      <circle cx="57" cy="49" r="49"/>
    </clipPath>
    <filter id="softViolet" x="-20%" y="-80%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="1.7"/>
    </filter>
  </defs>

  <g id="mark">
    <circle id="disc" cx="57" cy="49" r="49" fill="url(#discGlow)"/>
    <g id="spectrum" clip-path="url(#discClip)" fill="url(#violetBars)" opacity=".78">
      <rect x="15" y="39" width="2" height="38" rx="1"/>
      <rect x="19" y="42" width="2" height="35" rx="1"/>
      <rect x="23" y="38" width="2" height="39" rx="1"/>
      <rect x="27" y="48" width="2" height="29" rx="1"/>
      <rect x="31" y="52" width="2" height="25" rx="1"/>
      <rect x="35" y="48" width="2" height="29" rx="1"/>
      <rect x="39" y="56" width="2" height="21" rx="1"/>
      <rect x="43" y="60" width="2" height="17" rx="1"/>
      <rect x="47" y="65" width="2" height="13" rx="1"/>
      <rect x="51" y="60" width="2" height="18" rx="1"/>
      <rect x="55" y="64" width="2" height="14" rx="1"/>
      <rect x="59" y="57" width="2" height="21" rx="1"/>
      <rect x="63" y="61" width="2" height="17" rx="1"/>
      <rect x="67" y="65" width="2" height="13" rx="1"/>
      <rect x="71" y="60" width="2" height="18" rx="1"/>
      <rect x="75" y="53" width="2" height="25" rx="1"/>
      <rect x="79" y="50" width="2" height="28" rx="1"/>
      <rect x="83" y="46" width="2" height="32" rx="1"/>
      <rect x="87" y="42" width="2" height="36" rx="1"/>
      <rect x="91" y="50" width="2" height="28" rx="1"/>
      <rect x="95" y="57" width="2" height="21" rx="1"/>
    </g>
    <g id="spectrumDots" clip-path="url(#discClip)" fill="#bfb1ff" opacity=".62">
      <circle cx="22" cy="69" r="1.1"/><circle cx="28" cy="66" r="1"/><circle cx="34" cy="72" r=".9"/>
      <circle cx="39" cy="66" r=".9"/><circle cx="47" cy="71" r=".9"/><circle cx="57" cy="67" r="1"/>
      <circle cx="66" cy="71" r=".9"/><circle cx="75" cy="65" r="1"/><circle cx="84" cy="69" r=".9"/>
      <circle cx="92" cy="64" r=".9"/>
    </g>
    <ellipse id="wave-floor" cx="57" cy="80" rx="38" ry="4.2" fill="url(#floorGlow)" filter="url(#softViolet)"/>
    <g id="music-note" fill="none" stroke="url(#noteInk)" stroke-linecap="round" stroke-linejoin="round">
      <path id="note-stem" pathLength="1" d="M61.8 23 C59.7 34.8 60.3 49.4 57.7 60.2 C55.6 68.7 47.8 74.1 41.7 70.6" stroke-width="4.2"/>
      <ellipse id="note-head" cx="47" cy="58.7" rx="10.8" ry="6.6" transform="rotate(-27 47 58.7)" stroke-width="3.5"/>
      <path id="note-flag" d="M62.8 22.4 C68.7 19 75.1 19.1 77.2 21.7 C78.8 23.7 76.8 26.2 71.2 27.3 C66.5 28.2 62.7 27.2 61.6 25.4" fill="url(#noteInk)" stroke-width="1.2"/>
    </g>
  </g>

  <g id="wordmark" fill="#d6d6d6" font-family="Arial, Helvetica, sans-serif" font-weight="700">
    <g id="word-hook" font-size="20">
      <text id="letter-h" x="8" y="118">H</text>
      <text id="letter-o1" x="36" y="118">O</text>
      <text id="letter-o2" x="63" y="118">O</text>
      <text id="letter-k" x="91" y="118">K</text>
    </g>
    <g id="word-craft" font-size="19">
      <text id="letter-c" x="0" y="139">C</text>
      <text id="letter-r" x="23" y="139">R</text>
      <text id="letter-a" x="47" y="139">A</text>
      <text id="letter-f" x="72" y="139">F</text>
      <text id="letter-t" x="94" y="139">T</text>
    </g>
  </g>
</svg>
