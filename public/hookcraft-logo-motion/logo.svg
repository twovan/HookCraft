<?xml version="1.0" encoding="UTF-8"?>
<?xml-stylesheet type="text/css" href="./motion.css"?>
<svg id="hookcraft-motion-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 114 141" role="img" aria-labelledby="logo-title logo-desc">
  <title id="logo-title">HookCraft animated logo</title>
  <desc id="logo-desc">A clean 1.5 second HookCraft startup logo reveal with a subtle elastic settle.</desc>
  <defs>
    <clipPath id="mark-clip">
      <circle cx="57" cy="41" r="41"/>
    </clipPath>
    <linearGradient id="scan-gradient" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#8e5cff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#8e5cff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="pulse-gradient" cx="50%" cy="42%" r="54%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#8f5cff" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#3f1bd8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g class="hookcraft-logo__stage">
    <image
      class="hookcraft-logo__base"
      width="114"
      height="141"
      href="./hookcraft-logo-02.png"
      preserveAspectRatio="xMidYMid meet"
    />
    <g class="hookcraft-logo__effects" clip-path="url(#mark-clip)">
      <circle class="hookcraft-logo__pulse" cx="57" cy="41" r="41" fill="url(#pulse-gradient)"/>
      <rect class="hookcraft-logo__scan" x="-42" y="0" width="28" height="82" fill="url(#scan-gradient)"/>
      <g class="hookcraft-logo__bars" fill="#b79cff">
        <rect x="16" y="54" width="3" height="18" rx="1.5"/>
        <rect x="22" y="45" width="3" height="27" rx="1.5"/>
        <rect x="28" y="36" width="3" height="36" rx="1.5"/>
        <rect x="34" y="48" width="3" height="24" rx="1.5"/>
        <rect x="40" y="57" width="3" height="15" rx="1.5"/>
        <rect x="74" y="56" width="3" height="16" rx="1.5"/>
        <rect x="80" y="47" width="3" height="25" rx="1.5"/>
        <rect x="86" y="38" width="3" height="34" rx="1.5"/>
        <rect x="92" y="49" width="3" height="23" rx="1.5"/>
        <rect x="98" y="58" width="3" height="14" rx="1.5"/>
      </g>
    </g>
  </g>
</svg>
